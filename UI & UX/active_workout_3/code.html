<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Atlas - Active Workout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: '#0D0D0D',
                        surface: '#1A1A1A',
                        primary: '#00E676',
                        secondary: '#2979FF',
                        textPrimary: '#FFFFFF',
                        textSecondary: '#A0A0A0',
                        border: '#2A2A2A',
                    },
                    borderRadius: {
                        "DEFAULT": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0D0D0D;
            color: #FFFFFF;
            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .timer-font {
            font-family: 'Inter', sans-serif;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col relative pb-24">
<!-- TopAppBar from JSON Anchor -->
<header class="bg-[#131313]/40 backdrop-blur-md text-[#75ff9e] font-['Inter'] tracking-tight font-bold uppercase docked full-width top-0 sticky shadow-[0_20px_40px_rgba(0,0,0,0.4)] flex justify-between items-center px-6 h-16 w-full z-40 border-b-0">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface overflow-hidden hover:opacity-80 transition-opacity active:scale-95 transition-transform cursor-pointer">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="close-up portrait of a young man with short dark hair in athletic wear against a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAdXribRGaXB4nHprFl04AlLTHYLr8zTXVM9DrgPMztv6Zbfyz635O6IUibPQy9IHofMM387cK8HxFbraJe9kgCU24UdeaQ-b3mLFSPIUJvaaUBMskoChTL0W--uLFg77-n10YG5J8pRDYDKOSieJqj_dGwKboSh-YzF_jCuM2taQ-aDyjE15TNBWoSCKyPFw12GpRyL3KNeAu9Jqxb8s7C9m75uhqc7vRvDugbADa4FW72gmWdmgZoXAYfRfO3401Hxb2MuafxQBT"/>
</div>
</div>
<div class="text-xl font-black italic tracking-tighter text-[#75ff9e]">
            PROJECT ATLAS
        </div>
<div class="hover:opacity-80 transition-opacity active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-[#75ff9e]">settings</span>
</div>
</header>
<!-- Workout Header / Timer -->
<div class="sticky top-16 z-30 bg-[#0D0D0D]/90 backdrop-blur-md border-b border-border">
<div class="px-6 py-4 flex justify-between items-center">
<div class="flex gap-4 text-xs font-label tracking-widest text-textSecondary font-bold">
<div class="flex gap-2">
<span class="text-textPrimary">EN</span>
<span>|</span>
<span class="cursor-pointer hover:text-textPrimary transition-colors">AR</span>
</div>
<div class="flex gap-2">
<span class="cursor-pointer hover:text-textPrimary transition-colors">LBS</span>
<span>|</span>
<span class="text-textPrimary">KG</span>
</div>
</div>
<div class="timer-font text-2xl font-black tracking-wider text-primary">
                45:12
            </div>
</div>
<!-- Progress Bar -->
<div class="h-[2px] w-full bg-surface">
<div class="h-full bg-primary w-2/5 shadow-[0_0_10px_rgba(0,230,118,0.5)]"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow px-4 py-6 flex flex-col gap-6">
<!-- Exercise Card 1 -->
<div class="bg-surface rounded-lg p-5 border border-border shadow-lg">
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="font-headline font-bold text-xl text-textPrimary tracking-tight uppercase mb-1">Barbell Back Squat</h2>
<p class="text-sm text-textSecondary font-body">Last: 140kg x 8</p>
</div>
<button class="text-textSecondary hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Table Layout -->
<div class="w-full">
<!-- Header -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 mb-3 px-2 text-xs font-label text-textSecondary tracking-wider uppercase">
<div class="text-center">Set</div>
<div>Previous</div>
<div class="text-center">kg</div>
<div class="text-center">Reps</div>
<div class="text-center"></div>
</div>
<!-- Row 1: Completed -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center px-2 py-2 mb-2 rounded bg-primary/10">
<div class="text-center text-sm font-bold text-primary">1</div>
<div class="text-sm text-textSecondary">140kg x 8</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-border text-primary text-center text-sm font-bold rounded h-9 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition-all" readonly="" type="number" value="140"/>
</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-border text-primary text-center text-sm font-bold rounded h-9 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition-all" readonly="" type="number" value="8"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded bg-primary text-[#0D0D0D] flex items-center justify-center">
<span class="material-symbols-outlined text-sm font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
</div>
</div>
<!-- Row 2: Active -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center px-2 py-2 mb-2 rounded border border-secondary shadow-[0_0_15px_rgba(41,121,255,0.15)] bg-secondary/5">
<div class="text-center text-sm font-bold text-textPrimary">2</div>
<div class="text-sm text-textSecondary">140kg x 8</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-secondary text-textPrimary text-center text-sm font-bold rounded h-9 focus:ring-2 focus:ring-secondary outline-none shadow-[0_0_8px_rgba(41,121,255,0.3)] transition-all" type="number" value="140"/>
</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-secondary text-textPrimary text-center text-sm font-bold rounded h-9 focus:ring-2 focus:ring-secondary outline-none shadow-[0_0_8px_rgba(41,121,255,0.3)] transition-all" placeholder="8" type="number"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded bg-[#2A2A2A] text-textSecondary hover:bg-primary hover:text-[#0D0D0D] transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<!-- Row 3: Pending -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center px-2 py-2 mb-2 rounded">
<div class="text-center text-sm font-bold text-textSecondary">3</div>
<div class="text-sm text-textSecondary">140kg x 8</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-border text-textSecondary text-center text-sm font-bold rounded h-9 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="-" type="number"/>
</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-border text-textSecondary text-center text-sm font-bold rounded h-9 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="-" type="number"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded bg-[#2A2A2A] text-textSecondary hover:bg-primary hover:text-[#0D0D0D] transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<button class="mt-2 w-full py-2 flex items-center justify-center gap-2 text-sm font-label font-bold text-secondary tracking-wider uppercase hover:bg-secondary/10 rounded transition-colors">
<span class="material-symbols-outlined text-sm">add</span> Add Set
                </button>
</div>
</div>
<!-- Exercise Card 2 -->
<div class="bg-surface rounded-lg p-5 border border-border shadow-lg opacity-80 hover:opacity-100 transition-opacity">
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="font-headline font-bold text-xl text-textPrimary tracking-tight uppercase mb-1">Romanian Deadlift</h2>
<p class="text-sm text-textSecondary font-body">Last: 120kg x 10</p>
</div>
<button class="text-textSecondary hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Table Layout -->
<div class="w-full">
<!-- Header -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 mb-3 px-2 text-xs font-label text-textSecondary tracking-wider uppercase">
<div class="text-center">Set</div>
<div>Previous</div>
<div class="text-center">kg</div>
<div class="text-center">Reps</div>
<div class="text-center"></div>
</div>
<!-- Row 1: Pending -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center px-2 py-2 mb-2 rounded">
<div class="text-center text-sm font-bold text-textSecondary">1</div>
<div class="text-sm text-textSecondary">120kg x 10</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-border text-textSecondary text-center text-sm font-bold rounded h-9 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="-" type="number"/>
</div>
<div>
<input class="w-full bg-[#1A1A1A] border border-border text-textSecondary text-center text-sm font-bold rounded h-9 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="-" type="number"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded bg-[#2A2A2A] text-textSecondary hover:bg-primary hover:text-[#0D0D0D] transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
</div>
</div>
<button class="w-full py-4 border border-dashed border-border rounded-lg text-textSecondary font-label font-bold tracking-widest uppercase hover:text-primary hover:border-primary transition-colors flex justify-center items-center gap-2">
<span class="material-symbols-outlined">add</span> Add Exercise
        </button>
</main>
<!-- Footer Action -->
<div class="fixed bottom-24 left-0 w-full px-4 z-40">
<button class="w-full bg-primary text-[#0D0D0D] font-headline font-black text-lg py-4 rounded-lg tracking-widest uppercase shadow-[0_10px_20px_rgba(0,230,118,0.3)] hover:bg-[#00C853] active:scale-[0.98] transition-all">
            Finish Workout
        </button>
</div>
<!-- BottomNavBar from JSON Anchor -->
<nav class="bg-[#131313]/80 backdrop-blur-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-4 rounded-t-xl bg-gradient-to-t from-[#131313] to-transparent shadow-[0_-10px_30px_rgba(0,0,0,0.5)] border-t-0 md:hidden font-['Inter'] text-[10px] font-medium tracking-widest">
<div class="flex flex-col items-center justify-center text-[#bacbb9] opacity-40 hover:text-[#b0c6ff] transition-colors active:translate-y-1 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span>DASHBOARD</span>
</div>
<div class="flex flex-col items-center justify-center text-[#75ff9e] scale-110 hover:text-[#b0c6ff] transition-colors active:translate-y-1 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1 text-[#75ff9e]">fitness_center</span>
<span class="text-[#75ff9e]">WORKOUT</span>
</div>
<div class="flex flex-col items-center justify-center text-[#bacbb9] opacity-40 hover:text-[#b0c6ff] transition-colors active:translate-y-1 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1">menu_book</span>
<span>LIBRARY</span>
</div>
</nav>
</body></html>
