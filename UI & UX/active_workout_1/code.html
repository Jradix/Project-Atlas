<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Atlas - Active Workout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#003918",
                    "inverse-surface": "#e5e2e1",
                    "error": "#ffb4ab",
                    "surface-container": "#201f1f",
                    "surface-dim": "#131313",
                    "background": "#131313",
                    "inverse-primary": "#006d35",
                    "on-secondary-container": "#f2f3ff",
                    "outline-variant": "#3b4a3d",
                    "on-error-container": "#ffdad6",
                    "on-primary-container": "#00612e",
                    "on-secondary-fixed-variant": "#00429b",
                    "on-secondary": "#002d6e",
                    "tertiary-fixed-dim": "#fdb878",
                    "secondary-fixed": "#d9e2ff",
                    "error-container": "#93000a",
                    "on-background": "#e5e2e1",
                    "secondary-container": "#0068ed",
                    "on-error": "#690005",
                    "surface-container-low": "#1c1b1b",
                    "tertiary-container": "#ffba79",
                    "surface-tint": "#00e475",
                    "surface-variant": "#353534",
                    "surface-container-highest": "#353534",
                    "surface": "#131313",
                    "tertiary-fixed": "#ffdcbf",
                    "on-tertiary-fixed": "#2d1600",
                    "surface-bright": "#3a3939",
                    "on-tertiary": "#4b2800",
                    "on-secondary-fixed": "#001945",
                    "on-tertiary-fixed-variant": "#6a3c03",
                    "secondary": "#b0c6ff",
                    "primary-fixed-dim": "#00e475",
                    "surface-container-lowest": "#0e0e0e",
                    "on-primary-fixed": "#00210b",
                    "secondary-fixed-dim": "#b0c6ff",
                    "on-surface": "#e5e2e1",
                    "on-surface-variant": "#bacbb9",
                    "tertiary": "#ffdec4",
                    "outline": "#859585",
                    "surface-container-high": "#2a2a2a",
                    "on-tertiary-container": "#794810",
                    "primary-container": "#00e676",
                    "on-primary-fixed-variant": "#005226",
                    "primary": "#75ff9e",
                    "inverse-on-surface": "#313030",
                    "primary-fixed": "#62ff96"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="bg-[#131313]/40 backdrop-blur-md text-[#75ff9e] font-['Inter'] tracking-tight font-bold uppercase docked full-width top-0 sticky bg-[#2a2a2a] shadow-[0_20px_40px_rgba(0,0,0,0.4)] flex justify-between items-center px-6 h-16 w-full z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/15 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
</div>
<div class="text-xl font-black italic tracking-tighter text-[#75ff9e] flex-1 text-center">
            PROJECT ATLAS
        </div>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-[#75ff9e]">settings</span>
</button>
<!-- Thin Progress Bar (Track & Lead) -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-surface-container-highest">
<div class="h-full bg-primary w-1/3"></div>
</div>
</header>
<!-- Timer / Focus Area -->
<div class="w-full px-6 py-8 flex flex-col items-center justify-center border-b border-outline-variant/15 bg-surface-dim">
<div class="text-secondary font-black text-6xl tracking-tighter leading-none">42:15</div>
<div class="text-on-surface-variant text-xs font-medium tracking-widest uppercase mt-2">Active Session</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 px-4 py-6 flex flex-col gap-8 max-w-3xl mx-auto w-full">
<!-- Exercise Card 1 -->
<section class="flex flex-col rounded-xl bg-surface-container-low overflow-hidden">
<!-- Header (Surface High) -->
<div class="bg-surface-container-high px-4 py-3 flex justify-between items-center">
<div>
<h2 class="text-on-surface text-xl font-bold tracking-tight">Barbell Bench Press</h2>
<p class="text-on-surface-variant text-xs font-medium mt-1">Last: 80kg x 10</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-lg">more_horiz</span>
</button>
</div>
<!-- Data Container -->
<div class="p-4 flex flex-col gap-4">
<!-- Headers -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 text-on-surface-variant text-[10px] font-medium tracking-widest uppercase mb-1 px-2">
<div class="text-center">SET</div>
<div>PREVIOUS</div>
<div class="text-center">KG</div>
<div class="text-center">REPS</div>
<div class="text-center"><span class="material-symbols-outlined text-[14px]">done</span></div>
</div>
<!-- Row 1 (Completed State - Primary Color) -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center bg-surface-container-low px-2 py-1 rounded-sm">
<div class="text-primary text-xs font-bold text-center">1</div>
<div class="text-on-surface-variant text-xs font-medium">80kg x 10</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-primary text-center font-bold text-sm rounded-sm border-0 focus:ring-0 px-1 placeholder-outline-variant pointer-events-none" disabled="" type="number" value="80"/>
</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-primary text-center font-bold text-sm rounded-sm border-0 focus:ring-0 px-1 placeholder-outline-variant pointer-events-none" disabled="" type="number" value="10"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded-sm bg-primary/20 text-primary flex items-center justify-center pointer-events-none">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</div>
<!-- Row 2 (Active State - Secondary Color glow) -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center bg-surface-container-low px-2 py-1 rounded-sm">
<div class="text-on-surface text-xs font-bold text-center">2</div>
<div class="text-on-surface-variant text-xs font-medium">80kg x 8</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-on-surface text-center font-bold text-sm rounded-sm border-0 border-b-2 border-secondary focus:ring-0 px-1 placeholder-outline-variant" placeholder="80" type="number"/>
</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-on-surface text-center font-bold text-sm rounded-sm border-0 border-b-2 border-secondary focus:ring-0 px-1 placeholder-outline-variant" placeholder="8" type="number"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded-sm bg-surface-container-highest text-on-surface-variant hover:text-on-surface hover:bg-surface-bright transition-colors flex items-center justify-center shadow-[0_4px_10px_rgba(0,0,0,0.3)]">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<!-- Row 3 (Pending State) -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center bg-surface-container-low px-2 py-1 rounded-sm opacity-60">
<div class="text-on-surface text-xs font-bold text-center">3</div>
<div class="text-on-surface-variant text-xs font-medium">80kg x 8</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-on-surface text-center font-bold text-sm rounded-sm border-0 focus:ring-0 px-1 placeholder-outline-variant" placeholder="-" type="number"/>
</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-on-surface text-center font-bold text-sm rounded-sm border-0 focus:ring-0 px-1 placeholder-outline-variant" placeholder="-" type="number"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded-sm bg-surface-container-highest text-on-surface-variant hover:text-on-surface hover:bg-surface-bright transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
<!-- Add Set Button -->
<button class="mt-2 text-on-surface-variant text-xs font-bold tracking-wide uppercase hover:text-on-surface transition-colors flex items-center justify-center gap-1 py-2">
<span class="material-symbols-outlined text-sm">add</span> Add Set
                </button>
</div>
</section>
<!-- Exercise Card 2 -->
<section class="flex flex-col rounded-xl bg-surface-container-low overflow-hidden">
<!-- Header (Surface High) -->
<div class="bg-surface-container-high px-4 py-3 flex justify-between items-center">
<div>
<h2 class="text-on-surface text-xl font-bold tracking-tight">Incline Dumbbell Press</h2>
<p class="text-on-surface-variant text-xs font-medium mt-1">Last: 35kg x 12</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-lg">more_horiz</span>
</button>
</div>
<!-- Data Container -->
<div class="p-4 flex flex-col gap-4">
<!-- Headers -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 text-on-surface-variant text-[10px] font-medium tracking-widest uppercase mb-1 px-2">
<div class="text-center">SET</div>
<div>PREVIOUS</div>
<div class="text-center">KG</div>
<div class="text-center">REPS</div>
<div class="text-center"><span class="material-symbols-outlined text-[14px]">done</span></div>
</div>
<!-- Row 1 (Pending State) -->
<div class="grid grid-cols-[30px_1fr_60px_60px_40px] gap-2 items-center bg-surface-container-low px-2 py-1 rounded-sm">
<div class="text-on-surface text-xs font-bold text-center">1</div>
<div class="text-on-surface-variant text-xs font-medium">35kg x 12</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-on-surface text-center font-bold text-sm rounded-sm border-0 focus:ring-0 px-1 placeholder-outline-variant" placeholder="-" type="number"/>
</div>
<div>
<input class="w-full h-8 bg-surface-container-lowest text-on-surface text-center font-bold text-sm rounded-sm border-0 focus:ring-0 px-1 placeholder-outline-variant" placeholder="-" type="number"/>
</div>
<div class="flex justify-center">
<button class="w-8 h-8 rounded-sm bg-surface-container-highest text-on-surface-variant hover:text-on-surface hover:bg-surface-bright transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-sm">check</span>
</button>
</div>
</div>
</div>
</section>
</main>
<!-- Floating Action Button (Finish Workout) -->
<div class="fixed bottom-24 right-6 z-40">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed rounded-xl px-6 py-4 font-bold tracking-wide uppercase flex items-center gap-2 shadow-[0_20px_40px_rgba(0,0,0,0.4)] hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined">stop_circle</span>
            Finish
        </button>
</div>
<!-- BottomNavBar (Hidden on md, visible on mobile) -->
<nav class="md:hidden bg-[#131313]/80 backdrop-blur-lg font-['Inter'] text-[10px] font-medium tracking-widest text-[#75ff9e] docked full-width bottom-0 fixed rounded-t-xl bg-gradient-to-t from-[#131313] to-transparent shadow-[0_-10px_30px_rgba(0,0,0,0.5)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-4">
<a class="hover:text-[#b0c6ff] transition-colors active:translate-y-1 transition-all flex flex-col items-center justify-center text-[#bacbb9] opacity-40" href="#">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span>DASHBOARD</span>
</a>
<a class="hover:text-[#b0c6ff] transition-colors active:translate-y-1 transition-all flex flex-col items-center justify-center text-[#75ff9e] scale-110" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span>WORKOUT</span>
</a>
<a class="hover:text-[#b0c6ff] transition-colors active:translate-y-1 transition-all flex flex-col items-center justify-center text-[#bacbb9] opacity-40" href="#">
<span class="material-symbols-outlined mb-1">menu_book</span>
<span>LIBRARY</span>
</a>
</nav>
</body></html>
