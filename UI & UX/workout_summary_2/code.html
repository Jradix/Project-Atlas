<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Workout Summary - Project Atlas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: '#0D0D0D',
                        surface: '#1A1A1A',
                        neon: '#00E676',
                        textPrimary: '#FFFFFF',
                        textSecondary: '#A3A3A3',
                        borderLight: '#333333'
                    },
                    borderRadius: {
                        "DEFAULT": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Public Sans", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0D0D0D;
            color: #FFFFFF;
            font-family: 'Public Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen bg-background text-textPrimary flex flex-col font-body antialiased">
<!-- Top Navigation (Hidden on this specific transactional screen based on "Automatic Suppression" rule for "Success/Confirmation" splash screens) -->
<!-- Minimalist Header as requested -->
<header class="w-full flex justify-between items-center p-6 bg-transparent z-10 sticky top-0">
<div class="flex gap-4 font-label text-xs tracking-widest text-textSecondary font-bold uppercase">
<button class="hover:text-neon transition-colors active:scale-95">EN</button>
<span class="text-borderLight">|</span>
<button class="hover:text-textPrimary transition-colors active:scale-95">AR</button>
</div>
<div class="flex gap-4 font-label text-xs tracking-widest text-textSecondary font-bold uppercase">
<button class="hover:text-neon transition-colors active:scale-95 text-neon">LBS</button>
<span class="text-borderLight">|</span>
<button class="hover:text-textPrimary transition-colors active:scale-95">KG</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col px-6 pb-24 pt-4 md:px-12 lg:px-24 max-w-5xl mx-auto w-full relative z-0">
<!-- Header Text -->
<div class="mb-12 mt-8 animate-fade-in-up">
<h1 class="font-headline font-black text-5xl md:text-7xl uppercase tracking-tighter text-textPrimary leading-none mb-2">Workout<br/><span class="text-neon">Complete</span></h1>
<p class="font-label text-sm text-textSecondary tracking-widest uppercase mt-4">Tuesday, 14 Nov • 65 Mins</p>
</div>
<!-- Total Volume Full-Screen Emphasis -->
<div class="flex-grow flex flex-col justify-center items-center py-12">
<div class="text-center relative">
<div class="absolute -inset-10 bg-neon opacity-5 blur-3xl rounded-full mix-blend-screen"></div>
<p class="font-label text-xs text-textSecondary tracking-[0.3em] uppercase mb-4 relative z-10">Total Volume</p>
<div class="font-headline font-black text-7xl md:text-9xl text-neon tracking-tighter leading-none relative z-10 drop-shadow-[0_0_15px_rgba(0,230,118,0.3)]">
                    14,250
                </div>
<p class="font-label text-sm text-neon tracking-widest uppercase mt-2 opacity-80 relative z-10">LBS Moved</p>
</div>
</div>
<!-- New Records Section (Bento Grid Style) -->
<div class="mt-8 mb-12 w-full">
<h2 class="font-label text-xs text-textSecondary tracking-[0.2em] uppercase mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-neon" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
                New Records
            </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Record Card 1 -->
<div class="bg-surface border border-borderLight rounded-lg p-5 flex items-center justify-between hover:border-neon/50 transition-colors group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded bg-background flex items-center justify-center border border-borderLight group-hover:border-neon/30 transition-colors">
<span class="material-symbols-outlined text-textPrimary">fitness_center</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg uppercase tracking-tight">Deadlift</h3>
<p class="font-label text-[10px] text-textSecondary tracking-widest uppercase">1RM PR</p>
</div>
</div>
<div class="text-right">
<div class="font-headline font-black text-2xl text-neon">405</div>
<div class="font-label text-[10px] text-textSecondary tracking-widest uppercase">LBS</div>
</div>
</div>
<!-- Record Card 2 -->
<div class="bg-surface border border-borderLight rounded-lg p-5 flex items-center justify-between hover:border-neon/50 transition-colors group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded bg-background flex items-center justify-center border border-borderLight group-hover:border-neon/30 transition-colors">
<span class="material-symbols-outlined text-textPrimary">monitor_weight</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg uppercase tracking-tight">Squat</h3>
<p class="font-label text-[10px] text-textSecondary tracking-widest uppercase">Volume PR</p>
</div>
</div>
<div class="text-right">
<div class="font-headline font-black text-2xl text-neon">5,200</div>
<div class="font-label text-[10px] text-textSecondary tracking-widest uppercase">LBS</div>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto w-full flex flex-col md:flex-row gap-4 pt-8 border-t border-borderLight">
<button class="w-full md:w-1/3 py-4 rounded-DEFAULT border border-borderLight text-textPrimary font-label font-bold tracking-widest uppercase text-sm hover:bg-surface hover:border-textSecondary transition-all active:scale-95 flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[18px]">share</span>
                SHARE
            </button>
<button class="w-full md:w-2/3 py-4 rounded-DEFAULT bg-neon text-background font-label font-black tracking-widest uppercase text-sm hover:bg-[#00c853] shadow-[0_0_20px_rgba(0,230,118,0.2)] hover:shadow-[0_0_30px_rgba(0,230,118,0.4)] transition-all active:scale-95">
                FINISH
            </button>
</div>
</main>
<!-- Background texture/image subtle overlay -->
<div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none mix-blend-overlay bg-cover bg-center" data-alt="dark gritty concrete texture industrial background low key lighting gym aesthetic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDQc-BAI74oVp09MfWxIpSuOXwtupcnZ1VwrhIi_WCkwqnR4YDNDcJbs8ESsaLNWyn98DRi1s_yCdzZeyFkxjOvlsIM5xV7U0UnoWT2NTBKeRlJ-M5tCZCBOY_Hyji6JqN9TmA3Bc_nVBrPjgw53yb_i7QHWtxfpdyxVRPeXZT02UR7lGv5btyH3AOjwFBOaRjlisRkIPEiktm6TM38uej4eq7xt6tazsSOkjfQ5PSo1tSdNSaCAe8jfnArKii966VW2H_gFyx9Vlt8');"></div>
<div class="fixed inset-0 z-[-1] bg-gradient-to-b from-background/80 via-background to-background pointer-events-none"></div>
</body></html>
